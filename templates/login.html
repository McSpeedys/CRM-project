<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norbit CRM | Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 15% 20%, rgba(37, 99, 235, 0.45), transparent 28%),
                radial-gradient(circle at 85% 75%, rgba(59, 130, 246, 0.35), transparent 25%),
                linear-gradient(135deg, #020617, #0f172a 45%, #0b3aa8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111827;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            width: 420px;
            height: 420px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 50%;
            filter: blur(1px);
        }

        body::before {
            left: -150px;
            bottom: 80px;
        }

        body::after {
            right: -140px;
            top: 120px;
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 430px;
            padding: 48px 42px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 26px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .logo-box {
            width: 86px;
            height: 86px;
            margin: 0 auto 18px;
            border-radius: 24px;
            background: linear-gradient(135deg, #0b5cff, #002f9f);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 900;
            box-shadow: 0 16px 35px rgba(37, 99, 235, 0.35);
        }

        .brand {
            font-size: 38px;
            letter-spacing: 4px;
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .company {
            color: #2563eb;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 14px;
        }

        .crm {
            display: flex;
            align-items: center;
            gap: 14px;
            justify-content: center;
            color: #2563eb;
            font-weight: 800;
            letter-spacing: 5px;
            margin-bottom: 24px;
        }

        .crm::before,
        .crm::after {
            content: "";
            width: 80px;
            height: 1px;
            background: #dbe3ef;
        }

        .user-icon {
            width: 42px;
            height: 42px;
            margin: 0 auto 24px;
            border: 2px solid #2563eb;
            color: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 18px;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group span {
            position: absolute;
            left: 17px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 18px;
        }

        input {
            width: 100%;
            height: 58px;
            padding: 0 18px 0 50px;
            border: 1px solid #d7deea;
            border-radius: 14px;
            font-size: 16px;
            color: #111827;
            background: #ffffff;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.13);
        }

        button {
            width: 100%;
            height: 58px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #1473ff, #0034c9);
            color: white;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.35);
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(37, 99, 235, 0.45);
        }

        .secure {
            margin-top: 28px;
            color: #64748b;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.78);
            font-size: 14px;
            z-index: 2;
        }

        @media (max-width: 500px) {
            .login-card {
                width: 92%;
                padding: 38px 26px;
            }

            .brand {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo-box">N</div>

        <div class="brand">NORBIT</div>
        <div class="company">ARGE VE YAZILIM</div>
        <div class="crm">CRM</div>

        <div class="user-icon">👤</div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="input-group">
                <span>👤</span>
                <input type="text" name="username" placeholder="Kullanıcı adı" required>
            </div>

            <div class="input-group">
                <span>🔒</span>
                <input type="password" name="password" placeholder="Şifre" required>
            </div>

            <button type="submit">↪ Giriş Yap</button>
        </form>

        <div class="secure">🛡 Güvenli bağlantı</div>
    </div>

    <div class="footer">
        © 2026 Norbit Arge ve Yazılım. Tüm hakları saklıdır.
    </div>

</body>
</html>
