<!DOCTYPE html>
<html>

<head>
    <title>CRM Login</title>
</head>

<body>

<h1>Stajyer CRM</h1>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST" action="/login">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
