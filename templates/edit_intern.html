<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norbit CRM | Stajyer Düzenle</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    background:#eef2f7;
}

.navbar{
    height:70px;
    background:linear-gradient(90deg,#132f7c,#2563eb);
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 35px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.logo small{
    display:block;
    font-size:12px;
    letter-spacing:1px;
}

.container{
    width:850px;
    margin:45px auto;
}

.card{
    background:white;
    border-radius:18px;
    padding:35px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

h2{
    color:#132f7c;
    margin-bottom:8px;
}

.subtitle{
    color:#666;
    margin-bottom:30px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:1/3;
}

label{
    margin-bottom:6px;
    font-size:14px;
    font-weight:600;
    color:#333;
}

input,
select{
    padding:12px;
    border:1px solid #d9d9d9;
    border-radius:10px;
    font-size:14px;
    transition:.2s;
}

input:focus,
select:focus{
    outline:none;
    border-color:#2563eb;
    box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:flex-end;
    gap:15px;
}

.cancel{
    text-decoration:none;
    background:#e5e7eb;
    color:#333;
    padding:12px 22px;
    border-radius:10px;
    font-weight:600;
    transition:.2s;
}

.cancel:hover{
    background:#d1d5db;
}

.save{
    border:none;
    background:#2563eb;
    color:white;
    padding:12px 22px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:.2s;
}

.save:hover{
    background:#1d4ed8;
}

</style>

</head>
<body>

<div class="navbar">

    <div class="logo">
        NORBIT
        <small>ARGE VE YAZILIM CRM</small>
    </div>

</div>

<div class="container">

<div class="card">

<h2>Stajyer Bilgilerini Düzenle</h2>

<p class="subtitle">
Stajyere ait bilgileri güncelleyebilir ve değişiklikleri kaydedebilirsin.
</p>

<form method="POST" action="/update/{{ intern.id }}">

<div class="form-grid">

<div class="form-group">
<label>Ad</label>
<input
name="first_name"
value="{{ intern.first_name }}"
required>
</div>

<div class="form-group">
<label>Soyad</label>
<input
name="last_name"
value="{{ intern.last_name }}"
required>
</div>

<div class="form-group">
<label>E-posta</label>
<input
type="email"
name="email"
value="{{ intern.email }}"
required>
</div>

<div class="form-group">
<label>Telefon</label>
<input
name="phone"
value="{{ intern.phone }}">
</div>

<div class="form-group">
<label>Okul</label>
<input
name="school"
value="{{ intern.school }}">
</div>

<div class="form-group">
<label>Bölüm</label>
<input
name="department"
value="{{ intern.department }}">
</div>

<div class="form-group">
<label>Staj Başlangıç Tarihi</label>
<input
type="date"
name="internship_start"
value="{{ intern.internship_start }}">
</div>

<div class="form-group">
<label>Staj Bitiş Tarihi</label>
<input
type="date"
name="internship_end"
value="{{ intern.internship_end }}">
</div>

<div class="form-group full">

<label>Durum</label>

<select name="status">

<option
value="pending"
{% if intern.status == "pending" %}selected{% endif %}>
Beklemede
</option>

<option
value="active"
{% if intern.status == "active" %}selected{% endif %}>
Aktif
</option>

<option
value="completed"
{% if intern.status == "completed" %}selected{% endif %}>
Tamamlandı
</option>

</select>

</div>

</div>

<div class="buttons">

<a href="/dashboard" class="cancel">
← Vazgeç
</a>

<button class="save" type="submit">
💾 Değişiklikleri Kaydet
</button>

</div>

</form>

</div>

</div>

</body>
</html>
